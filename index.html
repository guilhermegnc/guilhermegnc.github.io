<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You</title>
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .heart {
            position: relative;
            width: 100px;
            height: 90px;
            background-color: red;
            transform: rotate(-45deg);
            margin-top: 10px;
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 100px 100px 0 0;
            background-color: red;
        }

        .heart::before {
            left: 0;
            top: -50px;
            transform: rotate(-45deg);
        }

        .heart::after {
            left: 50px;
            top: -50px;
            transform: rotate(45deg);
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="heart"></div>
    <h1>I love you</h1>
</body>
</html>
